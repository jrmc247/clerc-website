<section class="history">
  <div class="history-eyebrow">Unsere Geschichte</div>
  <ol class="timeline">
    @for (m of milestones; track m.year; let last = $last) {
      <li class="milestone" [class.last]="last">
        <span class="dot" [style.background]="m.color"></span>
        <span class="year">{{ m.year }}</span>
        <span class="label">{{ m.label }}</span>
      </li>
    }
  </ol>
</section>
